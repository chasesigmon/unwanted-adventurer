<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Arena</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="login-overlay">
      <form id="login-form">
        <h1>Text Arena</h1>
        <p>Move with WASD / Arrow keys. Collect orbs. Press Enter to chat.</p>
        <input
          id="username-input"
          type="text"
          placeholder="Choose a username"
          maxlength="16"
          autocomplete="off"
          required
        />
        <button type="submit">Join Arena</button>
        <div id="login-error"></div>
      </form>
    </div>

    <div id="hud">
      <div id="leaderboard">
        <h3>Leaderboard</h3>
        <ol id="leaderboard-list"></ol>
      </div>
      <div id="chat">
        <div id="chat-log"></div>
        <input id="chat-input" type="text" maxlength="140" placeholder="Press Enter to chat..." />
      </div>
    </div>

    <div id="game-container"></div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
