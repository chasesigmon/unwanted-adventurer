services:
  mongo:
    build:
      context: ./docker/mongo
      dockerfile: Dockerfile.mongo
    container_name: text-arena-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: text-arena
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    build:
      context: ./docker/redis
      dockerfile: Dockerfile.redis
    container_name: text-arena-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  game2d-postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile.postgresql
    container_name: game2d-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: game2d
      POSTGRES_PASSWORD: game2d
      POSTGRES_DB: game2d
    volumes:
      - game2d-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U game2d -d game2d"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mongo-data:
  redis-data:
  game2d-postgres-data:
