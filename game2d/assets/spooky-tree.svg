       "haunted forest" tree. A later follow-up ask ("the trees in
       direfell are really hard to see") found the ORIGINAL palette here
       (#241414/#301c1c/#180d0d) nearly identical to the floor tile's own
       #2c1414 — invisible by design, not just small. Pale, moonlit
       bone-grey branches against that same dark red-black ground read as
       "haunted" (dead trees under moonlight) while actually being visible,
       instead of chasing "creepy" straight into "same color as the dirt." -->
