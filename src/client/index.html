<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Arena</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="login-overlay">
      <form id="login-form">
        <h1>Text Arena</h1>
        <p>Type a command and press Enter: w/up, a, s/down, d.</p>
        <input
          id="username-input"
          type="text"
          placeholder="Choose a username"
          maxlength="16"
          autocomplete="off"
          required
        />
        <button type="submit">Join Arena</button>
        <div id="login-error"></div>
      </form>
    </div>

    <div id="hud">
      <div id="position-readout">Position: (0, 0)</div>

      <div id="bottom-bar">
        <div id="status-row">
          <div id="action-log"></div>
          <div id="minimap"></div>
        </div>
        <input
          id="command-input"
          type="text"
          maxlength="32"
          autocomplete="off"
          placeholder="Type a command (w, a, s, d, up, down) and press Enter..."
        />
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
