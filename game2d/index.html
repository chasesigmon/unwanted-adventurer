<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goblin Roam — 2D</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="auth-screen">
        <form id="auth-form">
          <h1>Goblin Roam</h1>
          <div class="auth-tabs">
            <button type="button" id="tab-login" class="auth-tab active">Login</button>
            <button type="button" id="tab-register" class="auth-tab">Register</button>
          </div>
          <label>
            Username
            <input id="auth-username" type="text" autocomplete="username" required minlength="2" maxlength="16" />
          </label>
          <label>
            Password
            <input id="auth-password" type="password" autocomplete="current-password" required minlength="8" />
          </label>
          <label id="auth-race-label" hidden>
            Race
            <select id="auth-race">
              <option value="goblin">Goblin</option>
              <option value="skeleton">Skeleton</option>
            </select>
          </label>
          <div id="auth-error"></div>
          <button type="submit" id="auth-submit">Login</button>
        </form>
      </div>

      <div id="game-root" hidden>
        <div id="game-container"></div>

        <div id="status-bar" class="panel">
          <button type="button" id="status-toggle" class="panel-toggle" title="Collapse">&minus;</button>
          <div id="status-content" class="panel-body">
            <span id="status-level"></span>
            <span id="status-hp"></span>
            <span id="status-mana"></span>
            <span id="status-mv"></span>
            <span id="status-exp"></span>
          </div>
        </div>

        <div id="log-panel" class="panel">
          <button type="button" id="log-toggle" class="panel-toggle" title="Collapse">&minus;</button>
          <div id="combat-log" class="panel-body"></div>
        </div>

        <div id="corner-buttons">
          <button type="button" id="autopilot-btn" class="corner-btn" title="Prompt (p)">💬</button>
          <button type="button" id="inventory-btn" class="corner-btn" title="Inventory (i)">🎒</button>
          <button type="button" id="char-sheet-btn" class="corner-btn" title="Character sheet (c)">📜</button>
        </div>

        <div id="char-sheet-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2 id="char-sheet-username">Character</h2>
            <div id="char-sheet-body" class="modal-stats"></div>
          </div>
        </div>

        <div id="inventory-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2>Inventory</h2>
            <ul id="inventory-list" class="inventory-list"></ul>
          </div>
        </div>

        <div id="autopilot-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2>Prompt</h2>
            <label class="autopilot-field">
              prompt:
              <input id="autopilot-input" type="text" placeholder="Roam around and kill wild goblins by punching them" autocomplete="off" />
            </label>
          </div>
        </div>
        <div id="autopilot-status" hidden></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
