<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Goblin Roam — 2D</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="auth-screen">
        <form id="auth-form">
          <h1>Goblin Roam</h1>
          <div class="auth-tabs">
            <button type="button" id="tab-login" class="auth-tab active">Login</button>
            <button type="button" id="tab-register" class="auth-tab">Register</button>
          </div>
          <label>
            Username
            <input id="auth-username" type="text" autocomplete="username" required minlength="2" maxlength="16" />
          </label>
          <label>
            Password
            <input id="auth-password" type="password" autocomplete="current-password" required minlength="8" />
          </label>
          <label id="auth-race-label" hidden>
            Race
            <select id="auth-race">
              <option value="goblin">Goblin</option>
              <option value="skeleton">Skeleton</option>
            </select>
          </label>
          <div id="auth-error"></div>
          <button type="submit" id="auth-submit">Login</button>
        </form>
      </div>

      <div id="game-root" hidden>
        <div id="game-container"></div>

        <div id="world-label"></div>

        <div id="status-bar" class="panel">
          <button type="button" id="status-toggle" class="panel-toggle" title="Collapse">&minus;</button>
          <div id="status-content" class="panel-body">
            <span id="status-level"></span>
            <span id="status-hp"></span>
            <span id="status-mana"></span>
            <span id="status-mv"></span>
            <span id="status-exp"></span>
          </div>
        </div>

        <div id="log-panel" class="panel">
          <button type="button" id="log-toggle" class="panel-toggle" title="Collapse">&minus;</button>
          <div class="log-tabs">
            <button type="button" id="log-tab-combat" class="log-tab active">Combat</button>
            <button type="button" id="log-tab-chat" class="log-tab">Chat</button>
          </div>
          <div id="combat-log" class="panel-body log-view"></div>
          <div id="chat-log" class="panel-body log-view" hidden></div>
          <input id="chat-input" type="text" placeholder="Press Enter to chat..." autocomplete="off" hidden />
        </div>

        <div id="corner-buttons">
          <button type="button" id="map-btn" class="corner-btn" title="Map (m)">🗺️</button>
          <button type="button" id="equipment-btn" class="corner-btn" title="Equipment (e)">🗡️</button>
          <button type="button" id="skills-btn" class="corner-btn" title="Skills (k)">⭐</button>
          <button type="button" id="autopilot-btn" class="corner-btn" title="Prompt (p)">💬</button>
          <button type="button" id="inventory-btn" class="corner-btn" title="Inventory (i)">🎒</button>
          <button type="button" id="char-sheet-btn" class="corner-btn" title="Character sheet (c)">📜</button>
        </div>

        <div id="char-sheet-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2 id="char-sheet-username">Character</h2>
            <div id="char-sheet-body" class="modal-stats"></div>
          </div>
        </div>

        <div id="inventory-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2>Inventory</h2>
            <ul id="inventory-list" class="inventory-list"></ul>
          </div>
        </div>

        <div id="skills-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2>Skills</h2>
            <div id="skills-body" class="modal-stats"></div>
          </div>
        </div>

        <div id="equipment-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2>Equipment</h2>
            <div id="equipment-body" class="modal-stats"></div>
          </div>
        </div>

        <div id="map-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2>Map</h2>
            <div class="map-tabs">
              <button type="button" id="map-tab-current" class="map-tab active" data-tab="current">Here</button>
              <button type="button" id="map-tab-world" class="map-tab" data-tab="world">World Map</button>
              <button type="button" id="map-tab-who" class="map-tab" data-tab="who">Who</button>
              <button type="button" id="map-tab-where" class="map-tab" data-tab="where">Where</button>
            </div>
            <div id="map-body" class="map-body"></div>
          </div>
        </div>

        <div id="corpse-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2 id="corpse-modal-title">Corpse</h2>
            <ul id="corpse-item-list" class="inventory-list"></ul>
            <button type="button" id="corpse-grab-all">Grab all</button>
          </div>
        </div>

        <div id="autopilot-modal" class="modal" hidden>
          <div class="modal-box">
            <button type="button" class="modal-close">&times;</button>
            <h2>Prompt</h2>
            <label class="autopilot-field">
              prompt:
              <input id="autopilot-input" type="text" placeholder="Roam around and kill wild goblins by punching them" autocomplete="off" />
            </label>
          </div>
        </div>
        <div id="autopilot-status" hidden></div>

        <div id="sleep-overlay" hidden>
          <div id="sleep-overlay-text">Zzz... (move or attack to wake up)</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
